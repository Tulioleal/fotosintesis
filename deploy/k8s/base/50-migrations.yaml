apiVersion: batch/v1
kind: Job
metadata:
  name: fotosintesis-migrations
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: fotosintesis-migrations
    app.kubernetes.io/part-of: fotosintesis-ai
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fotosintesis-migrations
        app.kubernetes.io/part-of: fotosintesis-ai
        iam.gke.io/workload-identity: fotosintesis-backend
    spec:
      restartPolicy: Never
      serviceAccountName: fotosintesis-backend
      # A native sidecar exits with the Pod after Alembic, allowing the Job to
      # reach Complete without workflow-managed deletion.
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: __CLOUD_SQL_PROXY_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - "--structured-logs"
            - "--port=__CLOUD_SQL_PROXY_PORT__"
            - "__CLOUD_SQL_INSTANCE_CONNECTION_NAME__"
          ports:
            - name: cloudsql
              containerPort: __CLOUD_SQL_PROXY_PORT__
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: migrations
          image: __IMAGE_REGISTRY__/backend:__BACKEND_IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              python - <<'PY'
              import socket
              import time

              deadline = time.monotonic() + 60
              while True:
                  try:
                      with socket.create_connection(
                          ("127.0.0.1", __CLOUD_SQL_PROXY_PORT__),
                          timeout=1,
                      ):
                          break
                  except OSError:
                      if time.monotonic() >= deadline:
                          raise SystemExit(
                              "Cloud SQL Proxy did not become ready within 60 seconds"
                          )
                      time.sleep(1)
              PY
              exec alembic upgrade head
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: __RUNTIME_SECRET_NAME__
                  key: __DATABASE_URL_SECRET_KEY__
            - name: OBJECT_STORAGE_PROVIDER
              value: __OBJECT_STORAGE_PROVIDER__
