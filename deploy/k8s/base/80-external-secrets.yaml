apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: __EXTERNAL_SECRETS_STORE_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: fotosintesis-secret-store
    app.kubernetes.io/part-of: fotosintesis-ai
spec:
  provider:
    gcpsm:
      projectID: __GCP_PROJECT_ID__
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: fotosintesis-backend
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: __RUNTIME_SECRET_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: fotosintesis-runtime-secret
    app.kubernetes.io/part-of: fotosintesis-ai
spec:
  refreshInterval: __EXTERNAL_SECRETS_REFRESH_INTERVAL__
  secretStoreRef:
    name: __EXTERNAL_SECRETS_STORE_NAME__
    kind: SecretStore
  target:
    name: __RUNTIME_SECRET_NAME__
    creationPolicy: Owner
  data:
    - secretKey: __DATABASE_URL_SECRET_KEY__
      remoteRef:
        key: fotosintesis-database-url
    - secretKey: __AUTH_SECRET_SECRET_KEY__
      remoteRef:
        key: fotosintesis-auth-secret
    - secretKey: openai-api-key
      remoteRef:
        key: fotosintesis-openai-api-key
    - secretKey: gemini-api-key
      remoteRef:
        key: fotosintesis-gemini-api-key
