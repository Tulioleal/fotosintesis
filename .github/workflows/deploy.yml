name: deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      backend_image_tag:
        description: "Full 40-character Git commit SHA. Optional for auto-dev deploys; the workflow reuses the tag of the currently deployed backend image when this is empty."
        required: false
        type: string
      frontend_image_tag:
        description: "Full 40-character Git commit SHA. Optional for auto-dev deploys; the workflow reuses the tag of the currently deployed frontend image when this is empty."
        required: false
        type: string
      trigger_source:
        required: false
        type: string
        default: manual
    outputs:
      backend_smoke_result:
        description: "Result of the in-cluster backend health check."
        value: ${{ jobs.deploy.outputs.backend_smoke_result }}
      frontend_smoke_result:
        description: "Result of the public frontend smoke check."
        value: ${{ jobs.deploy.outputs.frontend_smoke_result }}
      migration_result:
        description: "Result of the migration Job wait."
        value: ${{ jobs.deploy.outputs.migration_result }}
      rollout_result:
        description: "Result of the backend, worker, and frontend rollout waits."
        value: ${{ jobs.deploy.outputs.rollout_result }}
      worker_readiness_result:
        description: "Result of the durable worker readiness check."
        value: ${{ jobs.deploy.outputs.worker_readiness_result }}
      required_keys_result:
        description: "Result of the provider API key secret projection check."
        value: ${{ jobs.deploy.outputs.required_keys_result }}
      backend_image_tag:
        description: "Backend image tag that was rendered into manifests."
        value: ${{ jobs.deploy.outputs.backend_image_tag }}
      frontend_image_tag:
        description: "Frontend image tag that was rendered into manifests."
        value: ${{ jobs.deploy.outputs.frontend_image_tag }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment. Production deploys require the `prod` GitHub Environment approval."
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod
      backend_image_tag:
        description: "Full 40-character Git commit SHA of the backend image. Must be a 40-character Git commit SHA, never `latest`."
        required: true
        type: string
      frontend_image_tag:
        description: "Full 40-character Git commit SHA of the frontend image. Must be a 40-character Git commit SHA, never `latest`."
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: 1.10.7
  # Repository-level variables the deploy workflow always relies on. Validate
  # them up front so a missing configuration fails fast with a clear message.
  # Per-environment identifiers are pinned to the matching env: dev workflows
  # always use DEV_*, prod workflows always use PROD_*. The values are
  # published by either the bootstrap root (foundation) or the iac.yml
  # post-apply sync job (per-environment outputs).
  FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL || '' }}
  FRONTEND_SERVER_API_BASE_URL: ${{ vars.FRONTEND_SERVER_API_BASE_URL || 'http://fotosintesis-backend:8000' }}
  MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER || 'mock' }}
  VISION_PROVIDER: ${{ vars.VISION_PROVIDER || 'mock' }}
  JUDGE_PROVIDER: ${{ vars.JUDGE_PROVIDER || 'mock' }}
  SEARCH_PROVIDER: ${{ vars.SEARCH_PROVIDER || 'mock' }}
  EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'mock' }}
  MODEL_PROVIDERS: ${{ vars.MODEL_PROVIDERS || '' }}
  VISION_PROVIDERS: ${{ vars.VISION_PROVIDERS || '' }}
  JUDGE_PROVIDERS: ${{ vars.JUDGE_PROVIDERS || '' }}
  SEARCH_PROVIDERS: ${{ vars.SEARCH_PROVIDERS || '' }}
  OPENAI_TEXT_MODEL: ${{ vars.OPENAI_TEXT_MODEL || 'gpt-5.4' }}
  OPENAI_VISION_MODEL: ${{ vars.OPENAI_VISION_MODEL || 'gpt-5.4' }}
  OPENAI_JUDGE_MODEL: ${{ vars.OPENAI_JUDGE_MODEL || 'gpt-5.4' }}
  OPENAI_SEARCH_MODEL: ${{ vars.OPENAI_SEARCH_MODEL || 'gpt-5.4' }}
  OPENAI_EMBEDDING_MODEL: ${{ vars.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
  GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL || 'gemini-2.5-flash' }}
  GEMINI_VISION_MODEL: ${{ vars.GEMINI_VISION_MODEL || 'gemini-2.5-flash' }}
  GEMINI_JUDGE_MODEL: ${{ vars.GEMINI_JUDGE_MODEL || 'gemini-2.5-flash' }}
  GEMINI_SEARCH_MODEL: ${{ vars.GEMINI_SEARCH_MODEL || 'gemini-2.5-flash' }}
  EMBEDDING_DIMENSION: ${{ vars.EMBEDDING_DIMENSION || '8' }}
  FRONTEND_EXPOSURE_MODE: ${{ vars.FRONTEND_EXPOSURE_MODE || 'ip-http' }}
  FRONTEND_HOSTNAME: ${{ vars.FRONTEND_HOSTNAME || '' }}
  MANAGED_CERTIFICATE_NAME: ${{ vars.MANAGED_CERTIFICATE_NAME || 'fotosintesis-managed-cert' }}
  CLOUD_SQL_PROXY_IMAGE: ${{ vars.CLOUD_SQL_PROXY_IMAGE || 'gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2' }}
  CLOUD_SQL_PROXY_PORT: ${{ vars.CLOUD_SQL_PROXY_PORT || '5432' }}
  DATABASE_URL_SECRET_KEY: ${{ vars.DATABASE_URL_SECRET_KEY || 'database-url' }}
  AUTH_SECRET_SECRET_KEY: ${{ vars.AUTH_SECRET_SECRET_KEY || 'auth-secret' }}
  DEFAULT_REPLICAS_DEV: ${{ vars.DEFAULT_REPLICAS_DEV || '1' }}
  DEFAULT_REPLICAS_PROD: ${{ vars.DEFAULT_REPLICAS_PROD || '2' }}
  JOBS_PRODUCER_ENABLED: ${{ vars.JOBS_PRODUCER_ENABLED || 'true' }}
  JOBS_WORKER_ENABLED: ${{ vars.JOBS_WORKER_ENABLED || 'true' }}
  JOBS_POLL_INTERVAL_SECONDS: ${{ vars.JOBS_POLL_INTERVAL_SECONDS || '5' }}
  JOBS_BATCH_SIZE: ${{ vars.JOBS_BATCH_SIZE || '10' }}
  JOBS_WORKER_CONCURRENCY: ${{ vars.JOBS_WORKER_CONCURRENCY || '5' }}
  JOBS_LEASE_DURATION_SECONDS: ${{ vars.JOBS_LEASE_DURATION_SECONDS || '300' }}
  JOBS_LEASE_RENEWAL_INTERVAL_SECONDS: ${{ vars.JOBS_LEASE_RENEWAL_INTERVAL_SECONDS || '60' }}
  JOBS_MAX_ATTEMPTS_DEFAULT: ${{ vars.JOBS_MAX_ATTEMPTS_DEFAULT || '3' }}
  JOBS_BACKOFF_BASE_SECONDS: ${{ vars.JOBS_BACKOFF_BASE_SECONDS || '10' }}
  JOBS_BACKOFF_CAP_SECONDS: ${{ vars.JOBS_BACKOFF_CAP_SECONDS || '3600' }}
  JOBS_SHUTDOWN_DRAIN_SECONDS: ${{ vars.JOBS_SHUTDOWN_DRAIN_SECONDS || '30' }}
  JOBS_METRICS_HOST: ${{ vars.JOBS_METRICS_HOST || '0.0.0.0' }}
  JOBS_METRICS_PORT: ${{ vars.JOBS_METRICS_PORT || '9100' }}
  JOBS_TERMINATION_GRACE_PERIOD_SECONDS: ${{ vars.JOBS_TERMINATION_GRACE_PERIOD_SECONDS || '90' }}
  # Service-account -> namespace service-account allow-list for one-off
  # kubectl runs (e.g. backend smoke check pods). The cluster's IAM
  # configuration still governs what the SA can do in GCP.
  BACKEND_KUBERNETES_SERVICE_ACCOUNT: fotosintesis-backend
  FRONTEND_KUBERNETES_SERVICE_ACCOUNT: fotosintesis-frontend

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }} (${{ inputs.trigger_source || 'manual' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      backend_smoke_result: ${{ steps.backend-smoke.outputs.result }}
      frontend_smoke_result: ${{ steps.frontend-smoke.outputs.result }}
      migration_result: ${{ steps.migration.outputs.result || 'skipped' }}
      rollout_result: ${{ steps.rollout.outputs.result || 'skipped' }}
      worker_readiness_result: ${{ steps.worker-readiness.outputs.result || 'skipped' }}
      required_keys_result: ${{ steps.required-keys.outputs.result || 'skipped' }}
      backend_image_tag: ${{ steps.render.outputs.backend_image_tag }}
      frontend_image_tag: ${{ steps.render.outputs.frontend_image_tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve env-scoped foundation and sync variables
        id: env-vars
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEV_WIF: ${{ vars.DEV_WIF_PROVIDER_ID }}
          PROD_WIF: ${{ vars.PROD_WIF_PROVIDER_ID }}
          DEV_DEPLOY_SA: ${{ vars.DEV_DEPLOY_SERVICE_ACCOUNT_EMAIL }}
          PROD_DEPLOY_SA: ${{ vars.PROD_DEPLOY_SERVICE_ACCOUNT_EMAIL }}
          DEV_STATE: ${{ vars.DEV_TF_STATE_BUCKET }}
          PROD_STATE: ${{ vars.PROD_TF_STATE_BUCKET }}
          DEV_REGISTRY: ${{ vars.DEV_ARTIFACT_REGISTRY_URL }}
          PROD_REGISTRY: ${{ vars.PROD_ARTIFACT_REGISTRY_URL }}
          DEV_BUCKET: ${{ vars.DEV_OBJECT_STORAGE_BUCKET }}
          PROD_BUCKET: ${{ vars.PROD_OBJECT_STORAGE_BUCKET }}
          DEV_IP: ${{ vars.DEV_STATIC_IP_NAME }}
          PROD_IP: ${{ vars.PROD_STATIC_IP_NAME }}
        run: |
          set -euo pipefail
          missing=0
          case "$ENVIRONMENT" in
            dev)
              ENV_WIF="$DEV_WIF"
              ENV_DEPLOY_SA="$DEV_DEPLOY_SA"
              ENV_STATE="$DEV_STATE"
              ENV_REGISTRY="$DEV_REGISTRY"
              ENV_BUCKET="$DEV_BUCKET"
              ENV_IP="$DEV_IP"
              ;;
            prod)
              ENV_WIF="$PROD_WIF"
              ENV_DEPLOY_SA="$PROD_DEPLOY_SA"
              ENV_STATE="$PROD_STATE"
              ENV_REGISTRY="$PROD_REGISTRY"
              ENV_BUCKET="$PROD_BUCKET"
              ENV_IP="$PROD_IP"
              ;;
            *)
              echo "::error::Unsupported environment '$ENVIRONMENT'." >&2
              exit 1
              ;;
          esac
          for pair in \
            "ENV_WIF_PROVIDER_ID:$ENV_WIF" \
            "ENV_DEPLOY_SERVICE_ACCOUNT_EMAIL:$ENV_DEPLOY_SA" \
            "ENV_TF_STATE_BUCKET:$ENV_STATE" \
            "ENV_ARTIFACT_REGISTRY_URL:$ENV_REGISTRY" \
            "ENV_OBJECT_STORAGE_BUCKET:$ENV_BUCKET" \
            "ENV_STATIC_IP_NAME:$ENV_IP"; do
            label="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "$value" ]; then
              echo "::error::Repository variable for $label is not set. Bootstrap and the iac.yml post-apply sync job publish the foundation and per-environment variables; check that the bootstrap root has been applied and the matching iac.yml apply has completed." >&2
              missing=1
            fi
            echo "$label=$value" >> "$GITHUB_OUTPUT"
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Validate required operator variables
        env:
          FRONTEND_EXPOSURE_MODE: ${{ env.FRONTEND_EXPOSURE_MODE }}
          FRONTEND_HOSTNAME: ${{ env.FRONTEND_HOSTNAME }}
          MANAGED_CERTIFICATE_NAME: ${{ env.MANAGED_CERTIFICATE_NAME }}
        run: |
          set -euo pipefail
          case "$FRONTEND_EXPOSURE_MODE" in
            hostname-https|ip-http) ;;
            *)
              echo "::error::FRONTEND_EXPOSURE_MODE must be hostname-https or ip-http." >&2
              exit 1
              ;;
          esac
          if [ "$FRONTEND_EXPOSURE_MODE" = "hostname-https" ] && [ -z "$FRONTEND_HOSTNAME" ]; then
            echo "::error::FRONTEND_HOSTNAME is required when FRONTEND_EXPOSURE_MODE=hostname-https." >&2
            exit 1
          fi
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.env-vars.outputs.ENV_WIF_PROVIDER_ID }}
          service_account: ${{ steps.env-vars.outputs.ENV_DEPLOY_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin
      - name: Initialize OpenTofu with the remote backend
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          tofu init \
            -input=false \
            -backend-config="bucket=${{ steps.env-vars.outputs.ENV_TF_STATE_BUCKET }}" \
            -backend-config="prefix=fotosintesis/${{ inputs.environment }}"
      - name: Read OpenTofu outputs
        id: tofu-outputs
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          tofu output -json > outputs.json
          # Required outputs the render step consumes. Fail fast when the
          # OpenTofu state does not yet expose a value (e.g. the env was
          # never applied) so the deploy never renders a half-configured
          # manifest.
          for key in artifact_repository_url backend_service_account_email frontend_service_account_email cloud_sql_database_name cloud_sql_instance_connection_name frontend_static_ip_name frontend_static_ip_address gke_cluster_name gke_cluster_location kubernetes_namespace object_storage_bucket project_id runtime_secret_name; do
            value=$(jq -r --arg k "$key" '.[$k].value // empty' outputs.json)
            if [ -z "$value" ]; then
              echo "::error::OpenTofu output $key is missing or empty." >&2
              exit 1
            fi
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done
      - name: Authenticate to GKE
        env:
          TF_OUT_PROJECT_ID: ${{ steps.tofu-outputs.outputs.project_id }}
          TF_OUT_GKE_CLUSTER_NAME: ${{ steps.tofu-outputs.outputs.gke_cluster_name }}
          TF_OUT_GKE_CLUSTER_LOCATION: ${{ steps.tofu-outputs.outputs.gke_cluster_location }}
        run: |
          gcloud config set project "$TF_OUT_PROJECT_ID"
          gcloud container clusters get-credentials "$TF_OUT_GKE_CLUSTER_NAME" \
            --region "$TF_OUT_GKE_CLUSTER_LOCATION"
      - name: Resolve and validate image tags
        id: resolve
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
          INPUT_BACKEND_TAG: ${{ inputs.backend_image_tag }}
          INPUT_FRONTEND_TAG: ${{ inputs.frontend_image_tag }}
          ENV_ARTIFACT_REGISTRY_URL: ${{ steps.tofu-outputs.outputs.artifact_repository_url }}
          ENV_PROJECT_ID: ${{ steps.tofu-outputs.outputs.project_id }}
        run: |
          set -euo pipefail
          sha40='^[0-9a-f]{40}$'

          healthy_tag() {
            local key="$1"
            kubectl get configmap fotosintesis-release-state \
              -n "$NAMESPACE" \
              -o "jsonpath={.data.$key}" \
              2>/dev/null || true
          }

          current_tag() {
            local deployment="$1"
            local image
            image="$(
              kubectl get "deployment/$deployment" \
                -n "$NAMESPACE" \
                -o jsonpath='{.spec.template.spec.containers[0].image}' \
                2>/dev/null || true
            )"
            if [ -n "$image" ]; then
              printf '%s' "${image##*:}"
            fi
          }

          resolve_one() {
            local label="$1"
            local input="$2"
            local deployment="$3"
            local healthy_key="$4"
            if [ -n "$input" ]; then
              printf '%s:%s' "input" "$input"
              return
            fi
            local healthy
            healthy="$(healthy_tag "$healthy_key")"
            if [ -n "$healthy" ]; then
              printf '%s' "last-healthy:$healthy"
              return
            fi
            local deployed
            deployed="$(current_tag "$deployment")"
            if [ -n "$deployed" ]; then
              printf '%s' "current-deployment:$deployed"
              return
            fi
            printf '%s' ""
          }

          extract_result() {
            local label="$1"
            local result="$2"

            if [ -z "$result" ]; then
              echo "::error::$label could not be resolved." >&2
              exit 1
            fi

            if printf '%s' "$result" | grep -v -q ':'; then
              echo "::error::Internal resolver error for $label: expected source:tag." >&2
              exit 1
            fi
          }

          reject_tag() {
            local label="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$label is empty after resolution. Pass a 40-character Git commit SHA or use the auto-dev resolve flow against an environment that already runs the service." >&2
              exit 1
            fi
            if [ "$value" = "latest" ]; then
              echo "::error::$label is set to 'latest'. Production deploys require a 40-character Git commit SHA, never 'latest'." >&2
              exit 1
            fi
            if ! printf '%s' "$value" | grep -Eq "$sha40"; then
              echo "::error::$label ('$value') is not a 40-character Git commit SHA." >&2
              exit 1
            fi
          }

          verify_image_exists() {
            local label="$1"
            local tag="$2"
            local repo="$3"
            if ! gcloud artifacts docker tags list \
              "$repo" \
              --project="$ENV_PROJECT_ID" \
              --format='value(tag)' \
              2>/dev/null | grep -Fxq "$tag"; then
              echo "::error::Resolved $label tag $tag does not exist in $repo" >&2
              exit 1
            fi
          }

          BACKEND_RESULT="$(resolve_one BACKEND_IMAGE_TAG "$INPUT_BACKEND_TAG" fotosintesis-backend backend-image-tag)"
          FRONTEND_RESULT="$(resolve_one FRONTEND_IMAGE_TAG "$INPUT_FRONTEND_TAG" fotosintesis-frontend frontend-image-tag)"

          extract_result BACKEND_IMAGE_TAG "$BACKEND_RESULT"
          extract_result FRONTEND_IMAGE_TAG "$FRONTEND_RESULT"

          BACKEND_IMAGE_TAG="${BACKEND_RESULT#*:}"
          BACKEND_TAG_SOURCE="${BACKEND_RESULT%:*}"
          FRONTEND_IMAGE_TAG="${FRONTEND_RESULT#*:}"
          FRONTEND_TAG_SOURCE="${FRONTEND_RESULT%:*}"

          reject_tag BACKEND_IMAGE_TAG "$BACKEND_IMAGE_TAG"
          reject_tag FRONTEND_IMAGE_TAG "$FRONTEND_IMAGE_TAG"

          verify_image_exists "backend" "$BACKEND_IMAGE_TAG" "$ENV_ARTIFACT_REGISTRY_URL/backend"
          verify_image_exists "frontend" "$FRONTEND_IMAGE_TAG" "$ENV_ARTIFACT_REGISTRY_URL/frontend"

          {
            echo "backend_image_tag=${BACKEND_IMAGE_TAG}"
            echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}"
            echo "backend_image_tag_source=${BACKEND_TAG_SOURCE}"
            echo "frontend_image_tag_source=${FRONTEND_TAG_SOURCE}"
          } >> "$GITHUB_OUTPUT"
      - name: Render Kubernetes manifests
        id: render
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
          TF_OUT_ARTIFACT_REGISTRY_URL: ${{ steps.tofu-outputs.outputs.artifact_repository_url }}
          TF_OUT_BACKEND_GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.tofu-outputs.outputs.backend_service_account_email }}
          TF_OUT_FRONTEND_GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.tofu-outputs.outputs.frontend_service_account_email }}
          TF_OUT_OBJECT_STORAGE_BUCKET: ${{ steps.tofu-outputs.outputs.object_storage_bucket }}
          TF_OUT_CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ steps.tofu-outputs.outputs.cloud_sql_instance_connection_name }}
          TF_OUT_CLOUD_SQL_DATABASE_NAME: ${{ steps.tofu-outputs.outputs.cloud_sql_database_name }}
          TF_OUT_STATIC_IP_NAME: ${{ steps.tofu-outputs.outputs.frontend_static_ip_name }}
          TF_OUT_STATIC_IP_ADDRESS: ${{ steps.tofu-outputs.outputs.frontend_static_ip_address }}
          TF_OUT_GKE_CLUSTER_NAME: ${{ steps.tofu-outputs.outputs.gke_cluster_name }}
          TF_OUT_GKE_CLUSTER_LOCATION: ${{ steps.tofu-outputs.outputs.gke_cluster_location }}
          TF_OUT_PROJECT_ID: ${{ steps.tofu-outputs.outputs.project_id }}
          BACKEND_IMAGE_TAG: ${{ steps.resolve.outputs.backend_image_tag }}
          FRONTEND_IMAGE_TAG: ${{ steps.resolve.outputs.frontend_image_tag }}
        run: |
          set -euo pipefail
          mkdir -p .generated/k8s/"$ENVIRONMENT"/rendered
          values_file=".generated/k8s/$ENVIRONMENT/values.env"

          effective_frontend_api_base_url="$FRONTEND_API_BASE_URL"
          if [ -z "$effective_frontend_api_base_url" ]; then
            case "$FRONTEND_EXPOSURE_MODE" in
              ip-http)
                effective_frontend_api_base_url="http://${TF_OUT_STATIC_IP_ADDRESS}"
                ;;
              hostname-https)
                if [ -z "$FRONTEND_HOSTNAME" ]; then
                  echo "::error::FRONTEND_HOSTNAME is required when FRONTEND_EXPOSURE_MODE=hostname-https and FRONTEND_API_BASE_URL is unset." >&2
                  exit 1
                fi
                effective_frontend_api_base_url="https://${FRONTEND_HOSTNAME}"
                ;;
              *)
                echo "::error::FRONTEND_EXPOSURE_MODE must be hostname-https or ip-http." >&2
                exit 1
                ;;
            esac
          fi

          effective_auth_url=""
          case "$FRONTEND_EXPOSURE_MODE" in
            ip-http)
              effective_auth_url="http://${TF_OUT_STATIC_IP_ADDRESS}"
              ;;
            hostname-https)
              effective_auth_url="https://${FRONTEND_HOSTNAME}"
              ;;
          esac
          if [ -z "$effective_auth_url" ] || printf '%s' "$effective_auth_url" | grep -qE '(0\.0\.0\.0|localhost|fotosintesis-backend)'; then
            echo "::error::Effective AUTH_URL is empty or contains an internal address." >&2
            exit 1
          fi

          write_env_value() {
            local name="$1"
            local value="$2"
            printf '%s=%s\n' "$name" "$(printf '%s' "$value" | jq -Rr @sh)"
          }

          {
            echo "NAMESPACE=${TF_OUT_NAMESPACE}"
            echo "APP_ENV=${ENVIRONMENT}"
            echo "IMAGE_REGISTRY=${TF_OUT_ARTIFACT_REGISTRY_URL}"
            echo "BACKEND_IMAGE_TAG=${BACKEND_IMAGE_TAG}"
            echo "FRONTEND_IMAGE_TAG=${FRONTEND_IMAGE_TAG}"
            if [ "$ENVIRONMENT" = "prod" ]; then
              echo "BACKEND_REPLICAS=${DEFAULT_REPLICAS_PROD}"
              echo "FRONTEND_REPLICAS=${DEFAULT_REPLICAS_PROD}"
            else
              echo "BACKEND_REPLICAS=${DEFAULT_REPLICAS_DEV}"
              echo "FRONTEND_REPLICAS=${DEFAULT_REPLICAS_DEV}"
            fi
            echo "FRONTEND_SERVICE_TYPE=ClusterIP"
            echo "FRONTEND_API_BASE_URL=${effective_frontend_api_base_url}"
            echo "FRONTEND_SERVER_API_BASE_URL=${FRONTEND_SERVER_API_BASE_URL}"
            echo "FRONTEND_EXPOSURE_MODE=${FRONTEND_EXPOSURE_MODE}"
            echo "FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME}"
            echo "STATIC_IP_NAME=${TF_OUT_STATIC_IP_NAME}"
            echo "MANAGED_CERTIFICATE_NAME=${MANAGED_CERTIFICATE_NAME}"
            echo "BACKEND_GCP_SERVICE_ACCOUNT_EMAIL=${TF_OUT_BACKEND_GCP_SERVICE_ACCOUNT_EMAIL}"
            echo "FRONTEND_GCP_SERVICE_ACCOUNT_EMAIL=${TF_OUT_FRONTEND_GCP_SERVICE_ACCOUNT_EMAIL}"
            echo "OBJECT_STORAGE_PROVIDER=gcs"
            echo "OBJECT_STORAGE_BUCKET=${TF_OUT_OBJECT_STORAGE_BUCKET}"
            echo "CLOUD_SQL_INSTANCE_CONNECTION_NAME=${TF_OUT_CLOUD_SQL_INSTANCE_CONNECTION_NAME}"
            echo "CLOUD_SQL_DATABASE_NAME=${TF_OUT_CLOUD_SQL_DATABASE_NAME}"
            echo "CLOUD_SQL_PROXY_IMAGE=${CLOUD_SQL_PROXY_IMAGE}"
            echo "CLOUD_SQL_PROXY_PORT=${CLOUD_SQL_PROXY_PORT}"
            echo "DATABASE_URL_SECRET_KEY=${DATABASE_URL_SECRET_KEY}"
            echo "AUTH_SECRET_SECRET_KEY=${AUTH_SECRET_SECRET_KEY}"
            echo "RUNTIME_SECRET_NAME=fotosintesis-runtime"
            echo "EXTERNAL_SECRETS_STORE_NAME=fotosintesis-secret-store"
            echo "EXTERNAL_SECRETS_REFRESH_INTERVAL=5m"
            echo "GCP_PROJECT_ID=${TF_OUT_PROJECT_ID}"
            echo "GKE_CLUSTER_PROJECT_ID=${TF_OUT_PROJECT_ID}"
            echo "GKE_CLUSTER_LOCATION=${TF_OUT_GKE_CLUSTER_LOCATION}"
            echo "GKE_CLUSTER_NAME=${TF_OUT_GKE_CLUSTER_NAME}"
            echo "MODEL_PROVIDER=${MODEL_PROVIDER}"
            echo "VISION_PROVIDER=${VISION_PROVIDER}"
            echo "JUDGE_PROVIDER=${JUDGE_PROVIDER}"
            echo "SEARCH_PROVIDER=${SEARCH_PROVIDER}"
            echo "EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}"
            write_env_value MODEL_PROVIDERS "$MODEL_PROVIDERS"
            write_env_value VISION_PROVIDERS "$VISION_PROVIDERS"
            write_env_value JUDGE_PROVIDERS "$JUDGE_PROVIDERS"
            write_env_value SEARCH_PROVIDERS "$SEARCH_PROVIDERS"
            echo "AUTH_URL=${effective_auth_url}"
            echo "OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL}"
            echo "OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL}"
            echo "OPENAI_JUDGE_MODEL=${OPENAI_JUDGE_MODEL}"
            echo "OPENAI_SEARCH_MODEL=${OPENAI_SEARCH_MODEL}"
            echo "OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL}"
            echo "GEMINI_TEXT_MODEL=${GEMINI_TEXT_MODEL}"
            echo "GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL}"
            echo "GEMINI_JUDGE_MODEL=${GEMINI_JUDGE_MODEL}"
            echo "GEMINI_SEARCH_MODEL=${GEMINI_SEARCH_MODEL}"
            echo "EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}"
            echo "JOBS_PRODUCER_ENABLED=${JOBS_PRODUCER_ENABLED}"
            echo "JOBS_WORKER_ENABLED=${JOBS_WORKER_ENABLED}"
            echo "JOBS_POLL_INTERVAL_SECONDS=${JOBS_POLL_INTERVAL_SECONDS}"
            echo "JOBS_BATCH_SIZE=${JOBS_BATCH_SIZE}"
            echo "JOBS_WORKER_CONCURRENCY=${JOBS_WORKER_CONCURRENCY}"
            echo "JOBS_LEASE_DURATION_SECONDS=${JOBS_LEASE_DURATION_SECONDS}"
            echo "JOBS_LEASE_RENEWAL_INTERVAL_SECONDS=${JOBS_LEASE_RENEWAL_INTERVAL_SECONDS}"
            echo "JOBS_MAX_ATTEMPTS_DEFAULT=${JOBS_MAX_ATTEMPTS_DEFAULT}"
            echo "JOBS_BACKOFF_BASE_SECONDS=${JOBS_BACKOFF_BASE_SECONDS}"
            echo "JOBS_BACKOFF_CAP_SECONDS=${JOBS_BACKOFF_CAP_SECONDS}"
            echo "JOBS_SHUTDOWN_DRAIN_SECONDS=${JOBS_SHUTDOWN_DRAIN_SECONDS}"
            echo "JOBS_METRICS_HOST=${JOBS_METRICS_HOST}"
            echo "JOBS_METRICS_PORT=${JOBS_METRICS_PORT}"
            echo "JOBS_TERMINATION_GRACE_PERIOD_SECONDS=${JOBS_TERMINATION_GRACE_PERIOD_SECONDS}"
          } > "$values_file"
          sh deploy/k8s/render.sh "$values_file" .generated/k8s/"$ENVIRONMENT"/rendered

          config_json="$(
            kubectl create \
              --dry-run=client \
              -f ".generated/k8s/$ENVIRONMENT/rendered/20-config.yaml" \
              -o json
          )"

          for family in MODEL_PROVIDERS VISION_PROVIDERS JUDGE_PROVIDERS SEARCH_PROVIDERS; do
            value="$(jq -er --arg family "$family" '.data[$family]' <<< "$config_json")"

            if ! printf '%s' "$value" |
                jq -e '
                  type == "array"
                  and length > 0
                  and all(.[];
                    type == "string"
                    and (. == "mock" or . == "openai" or . == "gemini")
                  )
                ' >/dev/null; then
              echo "::error::$family in rendered ConfigMap must be a non-empty JSON array containing only mock, openai, or gemini." >&2
              exit 1
            fi
          done

          rendered_auth_url="$(jq -er '.data.AUTH_URL' <<< "$config_json")"
          if [ "$rendered_auth_url" != "$effective_auth_url" ]; then
            echo "::error::Rendered AUTH_URL ($rendered_auth_url) does not match expected value ($effective_auth_url)." >&2
            exit 1
          fi

          rendered_frontend_resources="$(
            kubectl create \
              --dry-run=client \
              -f ".generated/k8s/$ENVIRONMENT/rendered/40-frontend.yaml" \
              -o json |
            jq -s '.'
          )"

          frontend_env_auth_url="$(
            jq -er '
              .[]
              | select(
                  .kind == "Deployment"
                  and .metadata.name == "fotosintesis-frontend"
                )
              | .spec.template.spec.containers[]
              | select(.name == "frontend")
              | .env[]
              | select(.name == "AUTH_URL")
              | .valueFrom.configMapKeyRef.key
            ' <<< "$rendered_frontend_resources"
          )"
          if [ "$frontend_env_auth_url" != "AUTH_URL" ]; then
            echo "::error::Frontend Deployment AUTH_URL env does not reference ConfigMap key AUTH_URL." >&2
            exit 1
          fi

          {
            echo "backend_image_tag=${BACKEND_IMAGE_TAG}"
            echo "frontend_image_tag=${FRONTEND_IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"
      - name: Apply namespace, service accounts, config
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/00-namespace.yaml"
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/10-service-accounts.yaml"
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/20-config.yaml"
      - name: Install or upgrade External Secrets Operator
        env:
          ESO_VERSION: ${{ vars.EXTERNAL_SECRETS_OPERATOR_VERSION || '0.10.4' }}
        run: |
          kubectl apply \
            --server-side \
            --force-conflicts \
            --field-manager=fotosintesis-deploy \
            -f "https://raw.githubusercontent.com/external-secrets/external-secrets/v${ESO_VERSION}/deploy/crds/bundle.yaml"

          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --version "$ESO_VERSION" \
            --set installCRDs=false

          kubectl -n external-secrets rollout status deploy/external-secrets --timeout=300s
          kubectl -n external-secrets rollout status deploy/external-secrets-webhook --timeout=300s
          kubectl -n external-secrets rollout status deploy/external-secrets-cert-controller --timeout=300s

          kubectl wait --for=condition=Available --timeout=300s \
            -n external-secrets deploy/external-secrets
          kubectl wait --for=condition=Available --timeout=300s \
            -n external-secrets deploy/external-secrets-webhook
          kubectl wait --for=condition=Available --timeout=300s \
            -n external-secrets deploy/external-secrets-cert-controller

          kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' --timeout=300s \
            -n external-secrets endpoints/external-secrets-webhook
      - name: Wait for External Secrets to project runtime Secret
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
          TF_OUT_RUNTIME_SECRET_NAME: ${{ steps.tofu-outputs.outputs.runtime_secret_name }}
        run: |
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/80-external-secrets.yaml"
          for _ in $(seq 1 30); do
            if kubectl get secret "$TF_OUT_RUNTIME_SECRET_NAME" -n "$TF_OUT_NAMESPACE" >/dev/null 2>&1; then
              echo "Runtime secret projected"
              exit 0
            fi
            sleep 10
          done
          echo "Runtime secret was not projected in time" >&2
          echo "--- SecretStore status ---" >&2
          kubectl describe secretstore fotosintesis-secret-store -n "$TF_OUT_NAMESPACE" >&2 || true
          echo "--- ExternalSecret status ---" >&2
          kubectl describe externalsecret "$TF_OUT_RUNTIME_SECRET_NAME" -n "$TF_OUT_NAMESPACE" >&2 || true
          echo "--- Recent events ---" >&2
          kubectl get events -n "$TF_OUT_NAMESPACE" --sort-by=.lastTimestamp >&2 || true
          echo "--- ESO controller logs ---" >&2
          kubectl logs -n external-secrets deploy/external-secrets --tail=100 >&2 || true
          exit 1
      - id: required-keys
        name: Verify required provider API key secrets are projected
        env:
          TF_OUT_RUNTIME_SECRET_NAME: ${{ steps.tofu-outputs.outputs.runtime_secret_name }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          missing=0

          read_provider_family() {
            kubectl get configmap fotosintesis-runtime-config \
              -n "$TF_OUT_NAMESPACE" \
              -o jsonpath="{.data.$1}" 2>/dev/null || true
          }

          check_provider_key() {
            local role="$1"
            local provider="$2"
            local key=""

            case "$provider" in
              ""|mock)
                return 0
                ;;
              openai)
                key="openai-api-key"
                ;;
              gemini)
                key="gemini-api-key"
                ;;
              *)
                echo "::error::$role has unknown provider '$provider'. Expected one of: mock, openai, gemini." >&2
                missing=1
                return 0
                ;;
            esac

            if ! kubectl get secret "$TF_OUT_RUNTIME_SECRET_NAME" -n "$TF_OUT_NAMESPACE" \
                -o jsonpath="{.data.$key}" 2>/dev/null | grep -q .; then
              echo "::error::$role=$provider requires secret key '$key' in $TF_OUT_RUNTIME_SECRET_NAME (namespace $TF_OUT_NAMESPACE)." >&2
              missing=1
            fi
          }

          check_provider_family() {
            local role="$1"
            local family="$2"
            if [ -z "$family" ]; then
              return 0
            fi

            if printf '%s' "$family" | grep -q '^\s*\['; then
              if ! printf '%s' "$family" | jq -e 'type == "array" and all(.[]; type == "string")' >/dev/null 2>&1; then
                echo "::error::$role must be a JSON array of strings or a comma-separated provider list." >&2
                missing=1
                return 0
              fi

              while IFS= read -r provider; do
                check_provider_key "$role" "$provider"
              done < <(printf '%s' "$family" | jq -r '.[]')
              return 0
            fi

            IFS=',' read -r -a providers <<< "$family"
            for provider in "${providers[@]}"; do
              provider="$(printf '%s' "$provider" | xargs)"
              check_provider_key "$role" "$provider"
            done
          }

          check_provider_family MODEL_PROVIDERS "$(read_provider_family MODEL_PROVIDERS)"
          check_provider_family VISION_PROVIDERS "$(read_provider_family VISION_PROVIDERS)"
          check_provider_family JUDGE_PROVIDERS "$(read_provider_family JUDGE_PROVIDERS)"
          check_provider_family SEARCH_PROVIDERS "$(read_provider_family SEARCH_PROVIDERS)"

          if [ "$missing" -ne 0 ]; then
            echo "::error::ExternalSecret $TF_OUT_RUNTIME_SECRET_NAME is missing one or more required provider API key entries, or provider configuration is invalid. See docs/deployment/external-secrets.md." >&2
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Required provider API keys are present"
          echo "result=pass" >> "$GITHUB_OUTPUT"
      - name: Validate workload manifests with Kubernetes API
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail

          for manifest in \
            30-backend.yaml \
            40-frontend.yaml \
            50-migrations.yaml \
            55-worker.yaml; do
            kubectl apply \
              --dry-run=server \
              -f ".generated/k8s/$ENVIRONMENT/rendered/$manifest"
          done
      - name: Apply migrations before backend/worker rollout
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          server_minor="$(kubectl version --output=json | jq -r '.serverVersion.minor' | tr -cd '0-9')"
          if [ -z "$server_minor" ] || [ "$server_minor" -lt 29 ]; then
            echo "::error::Native migration sidecars require Kubernetes 1.29 or newer." >&2
            exit 1
          fi
          kubectl delete job/fotosintesis-migrations -n "$TF_OUT_NAMESPACE" --ignore-not-found
          # Render and apply migrations only. Backend and worker are
          # rolled out by the next step, after the migration wait below.
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/50-migrations.yaml"
      - id: migration
        name: Wait for migrations
        env:
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          if ! kubectl wait \
            --for=condition=complete \
            job/fotosintesis-migrations \
            -n "$TF_OUT_NAMESPACE" \
            --timeout=600s; then
            echo "::error::Migration Job did not complete" >&2
            kubectl logs job/fotosintesis-migrations \
              -n "$TF_OUT_NAMESPACE" -c migrations || true
            kubectl logs job/fotosintesis-migrations \
              -n "$TF_OUT_NAMESPACE" -c cloud-sql-proxy || true
            kubectl describe job/fotosintesis-migrations \
              -n "$TF_OUT_NAMESPACE" || true
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "result=pass" >> "$GITHUB_OUTPUT"
      - name: Apply backend
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/30-backend.yaml"
          kubectl rollout restart deployment/fotosintesis-backend \
            -n "$TF_OUT_NAMESPACE"
      - name: Apply worker
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/55-worker.yaml"
          kubectl rollout restart deployment/fotosintesis-worker \
            -n "$TF_OUT_NAMESPACE"
      - name: Apply frontend, ingress, certificate
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          FRONTEND_EXPOSURE_MODE: ${{ env.FRONTEND_EXPOSURE_MODE }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/40-frontend.yaml"
          kubectl rollout restart deployment/fotosintesis-frontend \
            -n "$TF_OUT_NAMESPACE"
          if [ "$FRONTEND_EXPOSURE_MODE" = "hostname-https" ]; then
            kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/60-managed-certificate.yaml"
          fi
          kubectl apply -f ".generated/k8s/$ENVIRONMENT/rendered/70-ingress.yaml"
      - id: rollout
        name: Wait for rollouts
        env:
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail

          wait_for_rollout() {
            deployment="$1"
            container="$2"

            if ! sh deploy/scripts/rollout-deployment.sh \
                "$TF_OUT_NAMESPACE" \
                "$deployment" \
                "$container" \
                600s; then
              echo "result=fail" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          }

          wait_for_rollout fotosintesis-backend backend
          wait_for_rollout fotosintesis-worker worker
          wait_for_rollout fotosintesis-frontend frontend

          echo "result=pass" >> "$GITHUB_OUTPUT"
      - id: worker-readiness
        name: Confirm durable worker readiness
        env:
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail

          if ! kubectl wait \
            --namespace "$TF_OUT_NAMESPACE" \
            --for=condition=Ready \
            pod \
            --selector app.kubernetes.io/name=fotosintesis-worker \
            --timeout=120s; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
            kubectl get pods \
              --namespace "$TF_OUT_NAMESPACE" \
              --selector app.kubernetes.io/name=fotosintesis-worker \
              -o wide || true
            exit 1
          fi

          worker_ready="$(
            kubectl get pods \
              --namespace "$TF_OUT_NAMESPACE" \
              --selector app.kubernetes.io/name=fotosintesis-worker \
              -o json |
            jq -r '
              .items
              | map(
                  .status.containerStatuses[]
                  | select(.name == "worker")
                  | .ready
                )
              | all
            '
          )"

          if [ "$worker_ready" != "true" ]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "result=pass" >> "$GITHUB_OUTPUT"
      - id: backend-smoke
        name: Backend health smoke check (in-cluster curl)
        env:
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail

          SMOKE_NAME="fotosintesis-backend-smoke"
          SMOKE_URL="http://fotosintesis-backend.$TF_OUT_NAMESPACE.svc.cluster.local:8000/health"

          cleanup() {
            kubectl delete pod "$SMOKE_NAME" \
              -n "$TF_OUT_NAMESPACE" \
              --ignore-not-found \
              --wait=false || true
          }

          trap cleanup EXIT
          cleanup

          if ! kubectl run "$SMOKE_NAME" \
              -n "$TF_OUT_NAMESPACE" \
              --image=curlimages/curl:8.10.1 \
              --restart=Never \
              --attach=true \
              --pod-running-timeout=120s \
              --command -- curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 5 \
              --max-time 10 \
              --retry 30 \
              --retry-delay 5 \
              --retry-max-time 180 \
              --retry-all-errors \
              "$SMOKE_URL"; then
            echo "::error::Backend health check failed" >&2
            kubectl logs "$SMOKE_NAME" -n "$TF_OUT_NAMESPACE" || true
            kubectl describe pod "$SMOKE_NAME" -n "$TF_OUT_NAMESPACE" || true
            kubectl get service fotosintesis-backend \
              -n "$TF_OUT_NAMESPACE" -o wide || true
            kubectl get endpointslice \
              -n "$TF_OUT_NAMESPACE" \
              -l kubernetes.io/service-name=fotosintesis-backend \
              -o yaml || true
            kubectl get pods \
              -n "$TF_OUT_NAMESPACE" \
              -l app.kubernetes.io/name=fotosintesis-backend \
              -o wide || true
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Backend health check passed"
          echo "result=pass" >> "$GITHUB_OUTPUT"
      - id: frontend-smoke
        name: Frontend public smoke check
        env:
          FRONTEND_EXPOSURE_MODE: ${{ env.FRONTEND_EXPOSURE_MODE }}
          FRONTEND_HOSTNAME: ${{ env.FRONTEND_HOSTNAME }}
          STATIC_IP_ADDRESS: ${{ steps.tofu-outputs.outputs.frontend_static_ip_address }}
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
        run: |
          set -euo pipefail

          if [ "$FRONTEND_EXPOSURE_MODE" = "hostname-https" ]; then
            origin="https://$FRONTEND_HOSTNAME"
          else
            origin="http://$STATIC_IP_ADDRESS"
          fi

          root_url="$origin/"
          providers_url="$origin/api/auth/providers"

          root_ready=false
          for _ in $(seq 1 60); do
            if curl --silent --show-error --fail --output /dev/null \
                --max-time 10 "$root_url"; then
              root_ready=true
              break
            fi
            echo "Waiting for frontend public endpoint: $root_url"
            sleep 10
          done

          if [ "$root_ready" != "true" ]; then
            echo "::error::Frontend public endpoint did not become ready: $root_url" >&2
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Frontend public endpoint OK: $root_url"

          providers_json="$(curl --silent --show-error --fail --max-time 10 "$providers_url" || true)"
          if [ -z "$providers_json" ]; then
            echo "::error::Auth.js /api/auth/providers did not return a response." >&2
            echo "--- providers response ---" >&2
            printf '%s\n' "$providers_json" >&2 || true
            echo "--- Frontend pod status ---" >&2
            kubectl get pods -n "$TF_OUT_NAMESPACE" -l app.kubernetes.io/name=fotosintesis-frontend -o wide || true
            kubectl logs -n "$TF_OUT_NAMESPACE" -l app.kubernetes.io/name=fotosintesis-frontend -c frontend --tail=100 || true
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! printf '%s' "$providers_json" | jq -e --arg origin "$origin" '
            [
              .credentials.signinUrl,
              .credentials.callbackUrl
            ]
            | all(.[]; startswith($origin + "/api/auth/"))
          ' >/dev/null; then
            echo "::error::Auth.js provider URLs do not use the public origin $origin" >&2
            echo "--- providers response ---" >&2
            printf '%s' "$providers_json" | jq '{credentials: {signinUrl: .credentials.signinUrl, callbackUrl: .credentials.callbackUrl}}' >&2 || true
            echo "--- Frontend pod status ---" >&2
            kubectl get pods -n "$TF_OUT_NAMESPACE" -l app.kubernetes.io/name=fotosintesis-frontend -o wide || true
            kubectl logs -n "$TF_OUT_NAMESPACE" -l app.kubernetes.io/name=fotosintesis-frontend -c frontend --tail=100 || true
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Auth.js provider URLs use origin $origin"
          echo "result=pass" >> "$GITHUB_OUTPUT"
      - name: Record last healthy image pair
        env:
          TF_OUT_NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
          BACKEND_IMAGE_TAG: ${{ steps.render.outputs.backend_image_tag }}
          FRONTEND_IMAGE_TAG: ${{ steps.render.outputs.frontend_image_tag }}
        run: |
          set -euo pipefail

          kubectl create configmap fotosintesis-release-state \
            -n "$TF_OUT_NAMESPACE" \
            --from-literal=backend-image-tag="$BACKEND_IMAGE_TAG" \
            --from-literal=frontend-image-tag="$FRONTEND_IMAGE_TAG" \
            --dry-run=client \
            -o yaml |
          kubectl apply -f -
      - name: Summary
        if: always()
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source || 'manual' }}
          BACKEND_IMAGE_TAG: ${{ steps.render.outputs.backend_image_tag }}
          FRONTEND_IMAGE_TAG: ${{ steps.render.outputs.frontend_image_tag }}
          BACKEND_IMAGE_TAG_SOURCE: ${{ steps.resolve.outputs.backend_image_tag_source }}
          FRONTEND_IMAGE_TAG_SOURCE: ${{ steps.resolve.outputs.frontend_image_tag_source }}
          MIGRATION: ${{ steps.migration.outputs.result || 'skipped' }}
          ROLLOUT: ${{ steps.rollout.outputs.result || 'skipped' }}
          WORKER_READINESS: ${{ steps.worker-readiness.outputs.result || 'skipped' }}
          REQUIRED_KEYS: ${{ steps.required-keys.outputs.result || 'skipped' }}
          BACKEND_SMOKE: ${{ steps.backend-smoke.outputs.result || 'skipped' }}
          FRONTEND_SMOKE: ${{ steps.frontend-smoke.outputs.result || 'skipped' }}
          GKE_CLUSTER_NAME: ${{ steps.tofu-outputs.outputs.gke_cluster_name }}
          GKE_CLUSTER_LOCATION: ${{ steps.tofu-outputs.outputs.gke_cluster_location }}
          NAMESPACE: ${{ steps.tofu-outputs.outputs.kubernetes_namespace }}
          GCP_PROJECT_ID: ${{ steps.tofu-outputs.outputs.project_id }}
          FRONTEND_EXPOSURE_MODE: ${{ env.FRONTEND_EXPOSURE_MODE }}
          FRONTEND_HOSTNAME: ${{ env.FRONTEND_HOSTNAME }}
          STATIC_IP_ADDRESS: ${{ steps.tofu-outputs.outputs.frontend_static_ip_address }}
        run: |
          RELEASE_STATE="not updated"
          if [ "${BACKEND_SMOKE}" = "pass" ] && [ "${FRONTEND_SMOKE}" = "pass" ]; then
            RELEASE_STATE="updated"
          fi

          {
            echo "## Deploy summary"
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${ENVIRONMENT}\` |"
            echo "| Trigger source | \`${TRIGGER_SOURCE}\` |"
            echo "| Backend image tag | \`${BACKEND_IMAGE_TAG}\` |"
            echo "| Backend image source | \`${BACKEND_IMAGE_TAG_SOURCE}\` |"
            echo "| Frontend image tag | \`${FRONTEND_IMAGE_TAG}\` |"
            echo "| Frontend image source | \`${FRONTEND_IMAGE_TAG_SOURCE}\` |"
            echo "| Release state | ${RELEASE_STATE} |"
            echo "| GCP project | \`${GCP_PROJECT_ID}\` |"
            echo "| GKE cluster | \`${GKE_CLUSTER_NAME}\` (${GKE_CLUSTER_LOCATION}) |"
            echo "| Namespace | \`${NAMESPACE}\` |"
