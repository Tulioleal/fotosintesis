name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "deploy/k8s/**"
      - "infra/opentofu/**"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "deploy/k8s/**"
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: dev
      backend_image_tag:
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACT_REGISTRY_URL: ${{ vars.DEV_ARTIFACT_REGISTRY_URL }}
  CI_SERVICE_ACCOUNT_EMAIL: ${{ vars.DEV_CI_SERVICE_ACCOUNT_EMAIL }}
  WIF_PROVIDER_ID: ${{ vars.DEV_WIF_PROVIDER_ID }}

jobs:
  validate:
    name: Lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Run tests
        env:
          MODEL_PROVIDER: mock
          VISION_PROVIDER: mock
          JUDGE_PROVIDER: mock
          SEARCH_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          OBJECT_STORAGE_PROVIDER: local
          OBJECT_STORAGE_BUCKET: fotosintesis-test-bucket
        run: pytest --ignore=tests/integration

  pg-test:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: fotosintesis
          POSTGRES_USER: fotosintesis
          POSTGRES_PASSWORD: fotosintesis
        options: >-
          --health-cmd pg_isready -U fotosintesis -d fotosintesis
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"
      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://fotosintesis:fotosintesis@localhost:5432/fotosintesis
          MODEL_PROVIDER: mock
          VISION_PROVIDER: mock
          JUDGE_PROVIDER: mock
          SEARCH_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          OBJECT_STORAGE_PROVIDER: local
          OBJECT_STORAGE_BUCKET: fotosintesis-test-bucket
        run: pytest tests/integration -v

  build:
    name: Build and push backend image
    needs: [validate, pg-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_ID }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
      - name: Set image tag
        id: meta
        run: |
          # Tag every image with the full 40-character Git commit SHA.
          # The deploy workflow refuses `latest` and any tag that does not
          # match this format, so the registry only contains immutable,
          # traceable artifacts.
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ARTIFACT_REGISTRY_URL }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.ARTIFACT_REGISTRY_URL }}/backend:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy backend to dev
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      backend_image_tag: ${{ needs.build.outputs.image_tag }}
      trigger_source: backend-ci
    secrets: inherit
