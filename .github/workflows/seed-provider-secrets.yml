name: seed-provider-secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: seed-provider-secrets-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  seed:
    name: Seed provider secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - id: env-vars
        name: Resolve environment variables
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEV_WIF: ${{ vars.DEV_WIF_PROVIDER_ID }}
          PROD_WIF: ${{ vars.PROD_WIF_PROVIDER_ID }}
          DEV_IAC_SA: ${{ vars.DEV_IAC_SERVICE_ACCOUNT_EMAIL }}
          PROD_IAC_SA: ${{ vars.PROD_IAC_SERVICE_ACCOUNT_EMAIL }}
          DEV_PROJECT_ID: ${{ vars.DEV_GCP_PROJECT_ID }}
          PROD_PROJECT_ID: ${{ vars.PROD_GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          case "$ENVIRONMENT" in
            dev)
              WIF="$DEV_WIF"
              IAC_SA="$DEV_IAC_SA"
              PROJECT_ID="$DEV_PROJECT_ID"
              ;;
            prod)
              WIF="$PROD_WIF"
              IAC_SA="$PROD_IAC_SA"
              PROJECT_ID="$PROD_PROJECT_ID"
              ;;
            *)
              echo "::error::Unsupported environment '$ENVIRONMENT'." >&2
              exit 1
              ;;
          esac

          missing=0
          for pair in \
            "WIF_PROVIDER_ID:$WIF" \
            "IAC_SERVICE_ACCOUNT_EMAIL:$IAC_SA" \
            "PROJECT_ID:$PROJECT_ID"; do
            label="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "$value" ]; then
              echo "::error::$label is missing." >&2
              missing=1
            fi
            echo "$label=$value" >> "$GITHUB_OUTPUT"
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.env-vars.outputs.WIF_PROVIDER_ID }}
          service_account: ${{ steps.env-vars.outputs.IAC_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Add Secret Manager versions
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_ID: ${{ steps.env-vars.outputs.PROJECT_ID }}
          DEV_OPENAI_API_KEY: ${{ secrets.DEV_OPENAI_API_KEY }}
          DEV_GEMINI_API_KEY: ${{ secrets.DEV_GEMINI_API_KEY }}
          PROD_OPENAI_API_KEY: ${{ secrets.PROD_OPENAI_API_KEY }}
          PROD_GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          case "$ENVIRONMENT" in
            dev)
              OPENAI_API_KEY="$DEV_OPENAI_API_KEY"
              GEMINI_API_KEY="$DEV_GEMINI_API_KEY"
              ;;
            prod)
              OPENAI_API_KEY="$PROD_OPENAI_API_KEY"
              GEMINI_API_KEY="$PROD_GEMINI_API_KEY"
              ;;
          esac

          missing=0
          for pair in \
            "OPENAI_API_KEY:$OPENAI_API_KEY" \
            "GEMINI_API_KEY:$GEMINI_API_KEY"; do
            label="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "$value" ]; then
              echo "::error::$label secret is missing or empty for $ENVIRONMENT." >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          printf '%s' "$OPENAI_API_KEY" | gcloud secrets versions add fotosintesis-openai-api-key \
            --project="$PROJECT_ID" \
            --data-file=-
          echo "Added version for fotosintesis-openai-api-key"

          printf '%s' "$GEMINI_API_KEY" | gcloud secrets versions add fotosintesis-gemini-api-key \
            --project="$PROJECT_ID" \
            --data-file=-
          echo "Added version for fotosintesis-gemini-api-key"
