name: iac

on:
  push:
    branches: [main]
    paths:
      - "infra/opentofu/**"
      - ".github/workflows/iac.yml"
  pull_request:
    paths:
      - "infra/opentofu/**"
      - ".github/workflows/iac.yml"
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod
      tofu_command:
        required: true
        type: choice
        default: apply
        options:
          - plan
          - apply

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: iac-${{ github.event.pull_request.number || github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.10.7
  CI_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CI_NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL || '' }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - name: tofu fmt -recursive -check
        run: tofu -chdir=infra/opentofu fmt -recursive -check

  pr-plan:
    name: PR offline plan (${{ matrix.environment }})
    needs: format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - name: tofu init without backend
        working-directory: infra/opentofu/envs/${{ matrix.environment }}
        env:
          TF_INPUT: "0"
        run: tofu init -backend=false
      - name: tofu validate
        working-directory: infra/opentofu/envs/${{ matrix.environment }}
        run: tofu validate
      - name: tofu plan without refresh
        working-directory: infra/opentofu/envs/${{ matrix.environment }}
        env:
          TF_VAR_region: ${{ env.CI_REGION }}
          TF_VAR_notification_email: ${{ env.CI_NOTIFICATION_EMAIL }}
          DEV_GCP_PROJECT_ID: ${{ vars.DEV_GCP_PROJECT_ID }}
          DEV_OBJECT_STORAGE_BUCKET: ${{ vars.DEV_OBJECT_STORAGE_BUCKET }}
          DEV_STATIC_IP_NAME: ${{ vars.DEV_STATIC_IP_NAME }}
          DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL: ${{ vars.DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL || '' }}
          PROD_GCP_PROJECT_ID: ${{ vars.PROD_GCP_PROJECT_ID }}
          PROD_OBJECT_STORAGE_BUCKET: ${{ vars.PROD_OBJECT_STORAGE_BUCKET }}
          PROD_STATIC_IP_NAME: ${{ vars.PROD_STATIC_IP_NAME }}
        run: |
          if [ "${{ matrix.environment }}" = "dev" ]; then
            export TF_VAR_project_id="${DEV_GCP_PROJECT_ID}"
            export TF_VAR_object_storage_bucket="${DEV_OBJECT_STORAGE_BUCKET}"
            export TF_VAR_frontend_static_ip_name="${DEV_STATIC_IP_NAME}"
            export TF_VAR_prod_promotion_service_account_email="${DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL}"
          else
            export TF_VAR_project_id="${PROD_GCP_PROJECT_ID}"
            export TF_VAR_object_storage_bucket="${PROD_OBJECT_STORAGE_BUCKET}"
            export TF_VAR_frontend_static_ip_name="${PROD_STATIC_IP_NAME}"
          fi
          tofu plan -refresh=false -out=tfplan -input=false
      - name: Generate readable plan text
        working-directory: infra/opentofu/envs/${{ matrix.environment }}
        run: |
          tofu show -no-color tfplan > plan.txt
          head -c 60000 plan.txt > plan.txt.truncated
          mv plan.txt.truncated plan.txt
      - name: Post offline plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/opentofu/envs/${{ matrix.environment }}/plan.txt', 'utf8');
            const truncated = plan.length >= 60000;
            const body = [
              '#### Offline `tofu plan -refresh=false` for ${{ matrix.environment }} (truncated=' + truncated + ')',
              '',
              'This pull request plan is an offline shape check. It runs `tofu init -backend=false` and `tofu plan -refresh=false` without authenticating to GCP, so it does not validate remote state drift or live cloud data.',
              '',
              '```',
              plan,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
      - name: Upload offline plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-tfplan-${{ matrix.environment }}
          path: |
            infra/opentofu/envs/${{ matrix.environment }}/tfplan
            infra/opentofu/envs/${{ matrix.environment }}/plan.txt
          retention-days: 5

  main-dev-plan:
    name: Main authenticated dev plan
    needs: format
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEV_WIF_PROVIDER_ID }}
          service_account: ${{ vars.DEV_CI_SERVICE_ACCOUNT_EMAIL }}
      - name: tofu init
        working-directory: infra/opentofu/envs/dev
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.DEV_TF_STATE_BUCKET }}" \
            -backend-config="prefix=fotosintesis/dev"
      - name: tofu validate
        working-directory: infra/opentofu/envs/dev
        run: tofu validate
      - name: tofu plan
        working-directory: infra/opentofu/envs/dev
        env:
          TF_VAR_project_id: ${{ vars.DEV_GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.CI_REGION }}
          TF_VAR_notification_email: ${{ env.CI_NOTIFICATION_EMAIL }}
          TF_VAR_object_storage_bucket: ${{ vars.DEV_OBJECT_STORAGE_BUCKET }}
          TF_VAR_frontend_static_ip_name: ${{ vars.DEV_STATIC_IP_NAME }}
          TF_VAR_prod_promotion_service_account_email: ${{ vars.DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL || '' }}
        run: tofu plan -out=tfplan -input=false
      - name: Generate readable plan text
        working-directory: infra/opentofu/envs/dev
        run: tofu show -no-color tfplan > plan.txt
      - name: Upload dev plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: |
            infra/opentofu/envs/dev/tfplan
            infra/opentofu/envs/dev/plan.txt
          retention-days: 5

  apply-dev-main:
    name: Auto-apply dev on main
    needs: main-dev-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEV_WIF_PROVIDER_ID }}
          service_account: ${{ vars.DEV_CI_SERVICE_ACCOUNT_EMAIL }}
      - name: tofu init
        working-directory: infra/opentofu/envs/dev
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.DEV_TF_STATE_BUCKET }}" \
            -backend-config="prefix=fotosintesis/dev"
      - name: Download dev plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra/opentofu/envs/dev
      - name: tofu apply
        working-directory: infra/opentofu/envs/dev
        run: tofu apply -input=false -auto-approve tfplan

  manual:
    name: Manual ${{ inputs.tofu_command }} (${{ inputs.environment }})
    if: github.event_name == 'workflow_dispatch'
    needs: format
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}
      - id: auth-dev
        if: inputs.environment == 'dev'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DEV_WIF_PROVIDER_ID }}
          service_account: ${{ vars.DEV_CI_SERVICE_ACCOUNT_EMAIL }}
      - id: auth-prod
        if: inputs.environment == 'prod'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.PROD_WIF_PROVIDER_ID }}
          service_account: ${{ vars.PROD_CI_SERVICE_ACCOUNT_EMAIL }}
      - name: tofu init
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        env:
          DEV_TF_STATE_BUCKET: ${{ vars.DEV_TF_STATE_BUCKET }}
          PROD_TF_STATE_BUCKET: ${{ vars.PROD_TF_STATE_BUCKET }}
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            TF_STATE_BUCKET="${DEV_TF_STATE_BUCKET}"
          else
            TF_STATE_BUCKET="${PROD_TF_STATE_BUCKET}"
          fi
          tofu init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=fotosintesis/${{ inputs.environment }}"
      - name: tofu validate
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        run: tofu validate
      - name: tofu plan
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        env:
          TF_VAR_region: ${{ env.CI_REGION }}
          TF_VAR_notification_email: ${{ env.CI_NOTIFICATION_EMAIL }}
          DEV_GCP_PROJECT_ID: ${{ vars.DEV_GCP_PROJECT_ID }}
          DEV_OBJECT_STORAGE_BUCKET: ${{ vars.DEV_OBJECT_STORAGE_BUCKET }}
          DEV_STATIC_IP_NAME: ${{ vars.DEV_STATIC_IP_NAME }}
          DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL: ${{ vars.DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL || '' }}
          PROD_GCP_PROJECT_ID: ${{ vars.PROD_GCP_PROJECT_ID }}
          PROD_OBJECT_STORAGE_BUCKET: ${{ vars.PROD_OBJECT_STORAGE_BUCKET }}
          PROD_STATIC_IP_NAME: ${{ vars.PROD_STATIC_IP_NAME }}
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            export TF_VAR_project_id="${DEV_GCP_PROJECT_ID}"
            export TF_VAR_object_storage_bucket="${DEV_OBJECT_STORAGE_BUCKET}"
            export TF_VAR_frontend_static_ip_name="${DEV_STATIC_IP_NAME}"
            export TF_VAR_prod_promotion_service_account_email="${DEV_PROD_PROMOTION_SERVICE_ACCOUNT_EMAIL}"
          else
            export TF_VAR_project_id="${PROD_GCP_PROJECT_ID}"
            export TF_VAR_object_storage_bucket="${PROD_OBJECT_STORAGE_BUCKET}"
            export TF_VAR_frontend_static_ip_name="${PROD_STATIC_IP_NAME}"
          fi
          tofu plan -out=tfplan -input=false
      - name: tofu apply
        if: inputs.tofu_command == 'apply'
        working-directory: infra/opentofu/envs/${{ inputs.environment }}
        run: tofu apply -input=false -auto-approve tfplan
