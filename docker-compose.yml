services:
  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter frontend dev"
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      AUTH_SECRET: local-development-auth-secret
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    command: sh -c "pip install -e . && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://fotosintesis:fotosintesis@postgres:5432/fotosintesis
      OBJECT_STORAGE_PROVIDER: local
      OBJECT_STORAGE_BUCKET: fotosintesis-local
      OBJECT_STORAGE_LOCAL_ROOT: storage-data
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      JOBS_PRODUCER_ENABLED: "${JOBS_PRODUCER_ENABLED:-false}"
      JOBS_WORKER_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: python:3.12-slim
    working_dir: /workspace/backend
    command: sh -c "pip install -e . && python -m app.jobs.worker"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://fotosintesis:fotosintesis@postgres:5432/fotosintesis
      OBJECT_STORAGE_PROVIDER: local
      OBJECT_STORAGE_BUCKET: fotosintesis-local
      OBJECT_STORAGE_LOCAL_ROOT: storage-data
      JOBS_PRODUCER_ENABLED: "${JOBS_PRODUCER_ENABLED:-false}"
      JOBS_WORKER_ENABLED: "${JOBS_WORKER_ENABLED:-true}"
      JOBS_POLL_INTERVAL_SECONDS: "5"
      JOBS_BATCH_SIZE: "10"
      JOBS_WORKER_CONCURRENCY: "5"
      JOBS_LEASE_DURATION_SECONDS: "300"
      JOBS_LEASE_RENEWAL_INTERVAL_SECONDS: "60"
      JOBS_MAX_ATTEMPTS_DEFAULT: "3"
      JOBS_BACKOFF_BASE_SECONDS: "10"
      JOBS_BACKOFF_CAP_SECONDS: "3600"
      JOBS_SHUTDOWN_DRAIN_SECONDS: "30"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fotosintesis
      POSTGRES_USER: fotosintesis
      POSTGRES_PASSWORD: fotosintesis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotosintesis -d fotosintesis"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storage-data:/data
    profiles:
      - storage

volumes:
  pnpm-store:
  postgres-data:
  storage-data:
